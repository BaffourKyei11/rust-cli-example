name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (with rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Build (library + binary)
        run: cargo build --lib --bins --verbose

      - name: Run tests (skip examples)
        run: cargo test --lib --bins --verbose

      - name: Check formatting (only the main package, skip examples)
        run: cargo fmt --package blkrs -- --check